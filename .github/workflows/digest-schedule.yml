name: Israel News Digest

on:
  schedule:
    - cron: '0 4 * * *'   # 07:00 Israel
    - cron: '0 9 * * *'   # 12:00 Israel
    - cron: '0 15 * * *'  # 18:00 Israel
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Generate and send digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - << 'EOF'
import os, json, re, urllib.request, urllib.parse
from openai import OpenAI
from datetime import datetime, timezone, timedelta

def get_israel_time():
    u = datetime.now(timezone.utc); m = u.month
    o = 3 if (3 < m < 11 or (m == 3 and u.day >= 25) or (m == 10 and u.day < 27)) else 2
    return u + timedelta(hours=o)

def determine_digest_type(hour):
    if 4 <= hour < 10: return "УТРЕННИЙ", "☀️"
    elif 10 <= hour < 16: return "ДНЕВНОЙ", "🌤"
    else: return "ВЕЧЕРНИЙ", "🌙"

SYSTEM_PROMPT = """Ты редактор новостного дайджеста для русскоязычной аудитории в Израиле.
Telegram-канал, три выпуска в день: 07:00, 12:00, 18:00.

ФОРМАТИРОВАНИЕ — КРИТИЧНО:
Используй ТОЛЬКО HTML: <b>жирный</b>, <i>курсив</i>
СТРОГО ЗАПРЕЩЕНО: звёздочки (**текст**), решётки (#), дефисы-списки (-), любой markdown.
Нарушение формата = ошибка.

СВЕЖЕСТЬ — КРИТИЧНО:
Включай ТОЛЬКО новости с датой публикации СЕГОДНЯ (дата в запросе), не старше 6 часов.
Перед каждой новостью убедись: дата публикации = сегодня. Если не видна — не включай.
Если за 6 часов меньше 3 значимых — расширь до 12 часов, напиши в начале: "Событий немного, но главное — вот".

ИСТОЧНИКИ (только эти, ищи через web_search):
Русские: mignews.com, 9tv.co.il, detaly.co.il, newsru.co.il, isra.com, vesty.co.il, cursorinfo.co.il
Английские: timesofisrael.com, haaretz.com, jpost.com, ynetnews.com, i24news.tv
Международные: reuters.com, bbc.com/news/world/middle-east, apnews.com
Сделай 3-4 web_search запроса перед сборкой.

ОТБОР: 3 новости (редко 4) из разных блоков:
Безопасность/армия | Политика/общество | Экономика/цены/жильё | Международный контекст | Жизнь в стране
Исключить: светская хроника, спорт без резонанса, пустые заявления без действий.

СТРУКТУРА:
[эмодзи] [ЧЧ:ММ], [день недели]

<b>[Короткий заголовок]</b>
2-3 предложения: факты + что это значит для читателя.
(Вечер — обязательно одна строка вывода или неочевидного угла.)

<b>[Заголовок]</b>
...

<b>[Заголовок]</b>
...

Закрытие:
☀️ Утро → короткое пожелание / "Хорошего дня!"
🌤 День → "За чем следить до вечера" (одна строка)
🌙 Вечер → живой вопрос к читателям (конкретный, не "ставь лайк")

@israel_daily

ОБЪЁМ: 800-1000 знаков. Больше — резать. Абзацы короткие.
ТОН: друг объясняет, не диктор. Позиция есть, без агрессии. Ирония — да, паника — нет.
БЕЗ ССЫЛОК: никаких URL, YouTube, гиперссылок в тексте."""

def generate_digest(digest_type, emoji, now_str, date_str, client):
    msg = (f"Сейчас {now_str} по израильскому времени, {date_str}.\n"
           f"Сгенерируй {digest_type} дайджест {emoji}.\n"
           f"Включай ТОЛЬКО новости опубликованные сегодня {date_str}, не старше 6 часов.\n"
           "Используй web_search (3-4 запроса).\n"
           "Верни ТОЛЬКО готовый текст для Telegram. Без ссылок. Только HTML теги <b> и <i>.")
    r = client.responses.create(model="gpt-4o", instructions=SYSTEM_PROMPT,
        tools=[{"type":"web_search_preview"}], input=msg)
    for item in r.output:
        if item.type == "message":
            for c in item.content:
                if c.type == "output_text" and c.text.strip():
                    return c.text.strip()
    return None

def get_image_for_digest(digest_text, client):
    prompt = (f"Find a relevant news photo for this Israeli news digest. "
              f"Search the web for a direct image URL ending in .jpg, .jpeg, .png or .webp from a news site. "
              f"Return ONLY valid JSON: {{"type":"url","value":"https://..."}} "
              f"or if no good photo found: {{"type":"dalle","value":"english description of scene for dall-e"}}. "
              f"Digest: {digest_text[:400]}")
    r = client.responses.create(model="gpt-4o", tools=[{"type":"web_search_preview"}], input=prompt)
    for item in r.output:
        if item.type == "message":
            for c in item.content:
                if c.type == "output_text":
                    m = re.search(r'\{[^{}]+\}', c.text, re.DOTALL)
                    if m:
                        try: return json.loads(m.group())
                        except: pass
    return {"type":"dalle","value":"Israeli news scene Middle East photorealistic"}

def get_image_url(decision, client):
    if decision.get('type') == 'url':
        url = decision['value']
        if re.search(r'\.(jpg|jpeg|png|webp)(\?|$)', url, re.I):
            try:
                req = urllib.request.Request(url, headers={'User-Agent':'Mozilla/5.0'})
                urllib.request.urlopen(req, timeout=8)
                print(f"Web image OK: {url[:80]}")
                return url
            except Exception as e:
                print(f"Web image failed: {e}, using DALL-E")
    try:
        p = decision.get('value', 'Israel Middle East news scene')
        print(f"DALL-E: {p[:80]}")
        r = client.images.generate(model="dall-e-3",
            prompt=f"Photorealistic editorial news photo: {p}. No text, no watermarks.",
            size="1024x1024", quality="standard", n=1)
        return r.data[0].url
    except Exception as e:
        print(f"DALL-E failed: {e}"); return None

def send_text(text, bot_token, chat_id):
    url = f"https://api.telegram.org/bot{bot_token}/sendMessage"
    data = urllib.parse.urlencode({'chat_id':chat_id,'text':text,'parse_mode':'HTML'}).encode()
    with urllib.request.urlopen(urllib.request.Request(url,data=data,method='POST'),timeout=30) as r:
        return json.loads(r.read().decode()).get('ok',False)

def send_photo(photo_url, bot_token, chat_id):
    url = f"https://api.telegram.org/bot{bot_token}/sendPhoto"
    data = urllib.parse.urlencode({'chat_id':chat_id,'photo':photo_url}).encode()
    try:
        with urllib.request.urlopen(urllib.request.Request(url,data=data,method='POST'),timeout=30) as r:
            return json.loads(r.read().decode()).get('ok',False)
    except Exception as e:
        print(f"Photo failed: {e}"); return False

now = get_israel_time()
digest_type, emoji = determine_digest_type(now.hour)
now_str = now.strftime('%H:%M')
date_str = now.strftime('%d.%m.%Y')
print(f"Generating {emoji} {digest_type} at {now_str} Israel time ({date_str})")

client = OpenAI(api_key=os.environ['OPENAI_API_KEY'])
BOT = os.environ['TELEGRAM_BOT_TOKEN']
CHAT = os.environ['TELEGRAM_CHAT_ID']

text = generate_digest(digest_type, emoji, now_str, date_str, client)
if not text:
    print("ERROR: digest generation failed"); exit(1)
print(f"Digest: {len(text)} chars")

if not send_text(text, BOT, CHAT):
    print("Text send failed"); exit(1)
print("Text sent!")

decision = get_image_for_digest(text, client)
print(f"Image: {decision.get('type')} — {str(decision.get('value',''))[:60]}")
img_url = get_image_url(decision, client)
if img_url:
    ok = send_photo(img_url, BOT, CHAT)
    print("Image sent!" if ok else "Image send failed")
else:
    print("No image")
EOF
